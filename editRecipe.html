<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Recipe - Admin</title>
</head>
<body>

  <h1>Edit Recipe</h1>
  <hr>

  <form action="edit_recipe.html" method="post">

    <label for="recipe_id">Recipe ID:</label><br>
    <input type="text" id="recipe_id" name="recipe_id" readonly value="101"><br><br>

    <label for="recipe_name">Recipe Name:</label><br>
    <input type="text" id="recipe_name" name="recipe_name" value="Spaghetti Carbonara" required><br><br>

    <label for="course_name">Course Name:</label><br>
    <select id="course_name" name="course_name" required>
      <option value="appetizers">Appetizers</option>
      <option value="main_course" selected>Main Course</option>
      <option value="dessert">Dessert</option>
    </select><br><br>

    <label for="description">Description:</label><br>
    <textarea id="description" name="description" rows="4" cols="50" required>A classic Italian pasta dish made with eggs, cheese, pancetta, and pepper.</textarea><br><br>

    <hr>
    <h2>Ingredients</h2>

    <table border="1" cellpadding="8" cellspacing="0">
      <thead>
        <tr>
          <th>Ingredient ID</th>
          <th>Ingredient Name</th>
          <th>Quantity</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><input type="text" name="ingredient_id[]" value="1" readonly size="5"></td>
          <td><input type="text" name="ingredient_name[]" value="Spaghetti" required></td>
          <td><input type="text" name="ingredient_qty[]" value="200g" required></td>
        </tr>
        <tr>
          <td><input type="text" name="ingredient_id[]" value="2" readonly size="5"></td>
          <td><input type="text" name="ingredient_name[]" value="Eggs" required></td>
          <td><input type="text" name="ingredient_qty[]" value="3" required></td>
        </tr>
        <tr>
          <td><input type="text" name="ingredient_id[]" value="3" readonly size="5"></td>
          <td><input type="text" name="ingredient_name[]" value="Pancetta" required></td>
          <td><input type="text" name="ingredient_qty[]" value="100g" required></td>
        </tr>
        <tr>
          <td><input type="text" name="ingredient_id[]" placeholder="ID" size="5"></td>
          <td><input type="text" name="ingredient_name[]" placeholder="Ingredient name"></td>
          <td><input type="text" name="ingredient_qty[]" placeholder="Quantity"></td>
        </tr>
        <tr>
          <td><input type="text" name="ingredient_id[]" placeholder="ID" size="5"></td>
          <td><input type="text" name="ingredient_name[]" placeholder="Ingredient name"></td>
          <td><input type="text" name="ingredient_qty[]" placeholder="Quantity"></td>
        </tr>
        <tr>
          <td><input type="text" name="ingredient_id[]" placeholder="ID" size="5"></td>
          <td><input type="text" name="ingredient_name[]" placeholder="Ingredient name"></td>
          <td><input type="text" name="ingredient_qty[]" placeholder="Quantity"></td>
        </tr>
      </tbody>
    </table>

    <br><br>
    <hr>

    <button type="submit">Save Changes</button>
    &nbsp;
    <button type="reset">Reset</button>
    &nbsp;
    <a href="recipes.html"><button type="button">Cancel</button></a>

  </form>

</body>
</html>
