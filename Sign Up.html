<!DOCTYPE html>
<html>
<head>
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="sign&log in.css">
    <script src="sign&log in.js"></script>
</head>
<body>
    <h1>Sign Up</h1>
    <h1>Already have an account? <a href="log%20in.html">Log In</a></h1>
    <hr>

    <form id="signupForm" action="Home_Page.html" method="post">
        <p>Please select your role:</p>
        <input type="radio" id="admin" name="user_role" value="admin">
        <label for="admin">Admin</label><br>
        <input type="radio" id="user" name="user_role" value="user" checked>
        <label for="user">User</label>
        <hr>

        <label for="username">Username:</label>
        <input type="text" id="username" required>
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" required>
        <br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" required>
        <br>
        <label for="confirm_password">Confirm Password:</label>
        <input type="password" id="confirm_password" required>
        <br><br>

        <hr>
        <input type="submit" value="Sign Up">
    </form>

    <script src="sign&log in.js"></script>
</body>
</html>
